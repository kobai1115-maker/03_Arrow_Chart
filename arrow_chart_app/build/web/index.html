<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="arrow_chart_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>arrow_chart_app</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      overflow: hidden;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s ease-in-out;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      width: 200px;
      height: auto;
      opacity: 0;
      animation:
        fadeIn 1.5s ease-out forwards,
        breathingPulse 4.0s ease-in-out infinite alternate;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes breathingPulse {
      0% {
        transform: scale(1.0);
      }

      100% {
        transform: scale(1.08);
        /* わずかに拡大 */
      }
    }

    .loading-text {
      margin-top: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: bold;
      color: #333333;
      letter-spacing: 2px;
      opacity: 0;
      animation: fadeIn 1.5s ease-out forwards;
    }
  </style>
</head>

<body>
  <div id="loadingOverlay" class="loading-overlay">
    <img src="icons/logo.png" alt="Logo" class="loading-logo" />
    <div class="loading-text">ARROW CHART</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide overlay smoothly when Flutter engine initializes and attaches its view
    const loadStartTime = Date.now();
    const observer = new MutationObserver(function (mutations) {
      for (const mutation of mutations) {
        if (mutation.addedNodes.length) {
          for (const node of mutation.addedNodes) {
            if (node.tagName === 'FLUTTER-VIEW') {
              const overlay = document.getElementById('loadingOverlay');
              if (overlay) {
                // Ensure the view has shown for at least 3 seconds
                const elapsed = Date.now() - loadStartTime;
                const remainingDelay = Math.max(3000 - elapsed, 200);
                setTimeout(() => {
                  overlay.classList.add('hidden');
                  setTimeout(() => overlay.remove(), 500); // Remove from DOM after fade out
                }, remainingDelay);
              }
              observer.disconnect();
              return;
            }
          }
        }
      }
    });
    observer.observe(document.body, { childList: true });
  </script>
</body>

</html>
