name: 関係性ダイアグラム — GitHub Pages 自動デプロイ

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: フォルダ構造の確認（デバッグ用）
        run: |
          echo "Checking directory structure..."
          ls -la
          pwd

      - name: Flutter をセットアップ
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: パッケージを取得
        working-directory: arrow_chart_app
        run: flutter pub get

      - name: SecretsからAPIキーを生成
        working-directory: arrow_chart_app
        run: |
          mkdir -p lib/constants
          cat << EOF > lib/constants/supabase_constants.dart
          class SupabaseConstants {
            static const String url = '${{ secrets.SUPABASE_URL }}';
            static const String anonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          EOF

      - name: Webアプリをビルド
        working-directory: arrow_chart_app
        run: flutter build web --release --wasm --tree-shake-icons --base-href "/03_Arrow_Chart/"

      - name: GitHub Pages の設定
        uses: actions/configure-pages@v4

      - name: ビルド成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: './arrow_chart_app/build/web'

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
